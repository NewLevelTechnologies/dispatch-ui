name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - dev
  workflow_dispatch: # Allow manual trigger

env:
  AWS_REGION: us-east-1
  S3_BUCKET: dispatch-dev-frontend
  CLOUDFRONT_DISTRIBUTION_ID: E21TOAR61GO7PC
  NODE_VERSION: '20'

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read    # Required to checkout code

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify production environment configuration
        run: |
          echo "📋 Production Environment Configuration:"
          echo "VITE_COGNITO_USER_POOL_ID=${{ vars.VITE_COGNITO_USER_POOL_ID }}"
          echo "VITE_COGNITO_CLIENT_ID=${{ vars.VITE_COGNITO_CLIENT_ID }}"
          echo "VITE_COGNITO_DOMAIN=${{ vars.VITE_COGNITO_DOMAIN }}"
          echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}"
          echo "VITE_ENV=production"

      - name: Build React app with Vite
        run: npm run build
        env:
          # Vite requires VITE_ prefixed environment variables
          VITE_COGNITO_USER_POOL_ID: ${{ vars.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_ENV: production

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::805778284966:role/dispatch-dev-github-actions-dispatch-ui
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.txt"

          # Upload index.html with no-cache to ensure latest version is served
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Frontend URL: https://dev.dispatch.newleveltech.net"
          echo "📦 S3 Bucket: ${{ env.S3_BUCKET }}"
          echo "🔄 CloudFront Distribution: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
